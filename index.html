<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MILECLAT — Planning</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MILECLAT">
<meta name="theme-color" content="#0D1B2A">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0D1B2A;--navy2:#1B4F72;--gold:#C9A84C;--gold-light:#E8D5A3;
  --white:#fff;--grey:#F4F6F7;--border:#D5D8DC;
  --urgent:#C0392B;--done:#1E8449;
  --colette:#1B4F72;--aloha:#1A7A4A;--aloha2:#27AE60;
  --paradise:#7D3C98;--autre:#E67E22;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0D1B2A;min-height:100vh;color:#222;}

/* ── HEADER ── */
.header{
  background:var(--navy);padding:10px 14px 8px;
  border-bottom:2px solid var(--gold);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
}
.logo-text{color:var(--gold);font-size:15px;font-weight:700;letter-spacing:1px;}
.logo-sub{color:var(--gold-light);font-size:9px;}
.header-right{display:flex;gap:6px;align-items:center;}
.mode-badge{padding:4px 8px;border-radius:20px;font-size:10px;font-weight:700;border:1.5px solid var(--gold);color:var(--gold);}
.mode-badge.consultant{border-color:#2ECC71;color:#2ECC71;}
.mode-badge.guest{border-color:#7F8C8D;color:#7F8C8D;}
.hbtn{background:var(--gold);border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hbtn.grey{background:#2C3E50;}

/* ── LOGIN OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:flex-end;justify-content:center;}
.overlay.hidden{display:none;}
.login-sheet{background:white;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;}
.ls-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.ls-close{background:var(--grey);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;}
.role-btn{width:100%;padding:12px;border-radius:10px;border:2px solid #E0E0E0;background:var(--grey);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:border-color .2s;}
.role-btn:hover{border-color:var(--gold);}
.role-emoji{font-size:22px;}
.pin-wrap{margin-top:12px;}
.pin-wrap label{display:block;font-size:10px;font-weight:700;color:#888;letter-spacing:1px;margin-bottom:4px;}
.pin-wrap input{width:100%;padding:11px;border:1.5px solid var(--border);border-radius:8px;font-size:20px;letter-spacing:8px;text-align:center;font-weight:700;color:var(--navy);background:white;}
.pin-submit{width:100%;padding:12px;background:var(--navy);color:var(--gold);border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.pin-error{color:var(--urgent);font-size:12px;text-align:center;margin-top:6px;display:none;}
.consult-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.consult-btn{padding:14px 8px;border-radius:10px;border:2px solid #E0E0E0;background:var(--grey);text-align:center;cursor:pointer;transition:border-color .2s;}
.consult-btn:hover{border-color:var(--gold);}
.consult-btn .ce{font-size:26px;display:block;margin-bottom:3px;}
.consult-btn span{font-size:11px;font-weight:600;color:#555;}

/* ── LÉGENDE ── */
.legend-bar{background:#111E2E;padding:8px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #1E3A5F;align-items:center;flex-wrap:wrap;}
.legend-bar::-webkit-scrollbar{display:none;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#BDC3C7;white-space:nowrap;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── TOOLBAR ── */
.toolbar{background:#111E2E;padding:8px 14px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #1E3A5F;align-items:center;}
.toolbar::-webkit-scrollbar{display:none;}
.week-nav{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.week-nav button{background:#1B2E42;border:1px solid #2E4A6A;color:var(--gold-light);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;}
.week-label{color:var(--gold);font-size:11px;font-weight:700;white-space:nowrap;}
.filter-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid #2E4A6A;background:transparent;color:#BDC3C7;font-size:10px;cursor:pointer;white-space:nowrap;}
.filter-chip.active{background:var(--gold);color:var(--navy);font-weight:700;border-color:var(--gold);}
.add-mission-btn{flex-shrink:0;background:var(--gold);border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--navy);cursor:pointer;margin-left:auto;}

/* ── CALENDRIER ── */
.calendar-wrap{overflow-x:auto;background:#0D1B2A;min-height:calc(100vh - 160px);}
.calendar{display:grid;grid-template-columns:repeat(7,minmax(130px,1fr));min-width:700px;}
.day-col{border-right:1px solid #1E3A5F;}
.day-col:last-child{border-right:none;}
.day-header{background:#111E2E;padding:8px 6px;text-align:center;border-bottom:2px solid #1E3A5F;position:sticky;top:0;z-index:10;}
.day-name{color:var(--gold);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.day-date{color:#7F8C8D;font-size:10px;margin-top:2px;}
.day-header.today{background:#1B2E42;}
.day-header.today .day-name{color:#FFD700;}
.day-content{padding:6px;min-height:200px;}

/* ── MISSION CARD ── */
.m-card{border-radius:8px;margin-bottom:6px;overflow:hidden;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,0.3);transition:transform .1s;}
.m-card:active{transform:scale(0.98);}
.m-card-head{padding:7px 8px 5px;}
.m-card-name{font-size:11px;font-weight:700;color:white;line-height:1.2;}
.m-card-time{font-size:9px;color:rgba(255,255,255,0.75);margin-top:2px;}
.m-card-addr{font-size:9px;color:rgba(255,255,255,0.65);margin-top:1px;}
.m-card-bottom{padding:4px 8px 5px;background:rgba(0,0,0,0.15);display:flex;justify-content:space-between;align-items:center;}
.m-card-agents{display:flex;gap:2px;font-size:12px;}
.m-card-badge{font-size:8px;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.15);padding:1px 5px;border-radius:8px;}
.m-card.urgent .m-card-name::before{content:"⚠ ";color:#FF6B6B;}

/* couleurs conciergeries */
.bg-colette{background:linear-gradient(135deg,#1B4F72,#2980B9);}
.bg-aloha{background:linear-gradient(135deg,#1A7A4A,#27AE60);}
.bg-paradise{background:linear-gradient(135deg,#7D3C98,#9B59B6);}
.bg-autre{background:linear-gradient(135deg,#E67E22,#F39C12);}

/* ── MODAL DÉTAIL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.modal-overlay.hidden{display:none;}
.modal-sheet{background:white;border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-head{padding:14px 16px 10px;border-bottom:3px solid var(--navy);position:sticky;top:0;background:white;z-index:10;}
.modal-head-top{display:flex;justify-content:space-between;align-items:flex-start;}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);}
.modal-close{background:var(--grey);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:17px;flex-shrink:0;}
.modal-addr{font-size:11px;color:var(--navy2);margin-top:3px;}
.modal-body{padding:14px 16px;}
.section{margin-bottom:14px;}
.section-title{font-size:10px;font-weight:700;color:var(--navy2);letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.info-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #F5F5F5;}
.info-row:last-child{border-bottom:none;}
.info-label{color:#777;}
.info-val{font-weight:600;color:var(--navy);text-align:right;max-width:60%;}
.code-box{background:var(--navy);color:var(--gold);border-radius:8px;padding:8px 12px;font-size:14px;font-weight:700;letter-spacing:3px;display:inline-block;margin-bottom:6px;}
.acces-text{font-size:11px;color:#555;line-height:1.6;background:#F8F9FA;border-radius:6px;padding:8px;border-left:3px solid var(--gold);}
.notes-box{font-size:11px;color:#7D5A0B;background:#FEF9EC;border-radius:6px;padding:8px;border-left:3px solid var(--gold);}

/* AGENTS SECTION */
.agents-grid{display:flex;gap:6px;flex-wrap:wrap;}
.agent-pill{display:flex;align-items:center;gap:4px;border:2px solid var(--border);border-radius:20px;padding:5px 10px;font-size:11px;cursor:pointer;background:var(--grey);transition:all .15s;user-select:none;}
.agent-pill.selected{background:var(--navy);border-color:var(--gold);color:var(--gold);font-weight:700;}
.agent-pill.locked{cursor:default;opacity:0.6;}

/* PHOTOS */
.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.photo-add{border:2px dashed var(--border);border-radius:8px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;background:var(--grey);color:#aaa;}
.photo-thumb{border-radius:8px;aspect-ratio:1;object-fit:cover;width:100%;}

/* DONE */
.done-row{display:flex;align-items:center;gap:8px;padding:10px 0;cursor:pointer;border-top:1px solid var(--border);user-select:none;}
.cbx{width:22px;height:22px;border:2px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cbx.on{background:var(--done);border-color:var(--done);}
.cbx.on::after{content:"✓";color:white;font-size:13px;font-weight:700;}
.done-lbl{font-size:12px;color:#777;font-weight:600;}
.done-lbl.on{color:var(--done);text-decoration:line-through;}

/* FORM */
.f-group{margin-bottom:10px;}
.f-label{display:block;font-size:10px;font-weight:700;color:#777;letter-spacing:1px;margin-bottom:3px;}
.f-input{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:white;}
.f-input:focus{outline:none;border-color:var(--navy2);}
.f-textarea{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;height:70px;resize:vertical;}
.f-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.supply-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.supply-item{display:flex;flex-direction:column;}
.supply-item label{font-size:9px;color:#888;margin-bottom:2px;}
.supply-item input{padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;}
.urgent-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;}
.urgent-row.on{border-color:var(--urgent);background:#FEF0EF;}
.f-submit{width:100%;padding:13px;background:var(--navy);color:var(--gold);border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.f-select{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:white;}

/* IMPORT */
.import-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;background:var(--grey);}
.import-zone:hover{border-color:var(--navy2);background:#EAF2FF;}
.import-icon{font-size:32px;margin-bottom:6px;}
.import-text{font-size:12px;color:#666;}

/* EMPTY */
.empty{text-align:center;padding:20px 10px;color:#3A4A5A;font-size:11px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo-text">🏠 MILECLAT</div>
    <div class="logo-sub" id="headerSub">Planning Missions</div>
  </div>
  <div class="header-right">
    <div class="mode-badge guest" id="modeBadge">👁 Visiteur</div>
    <button class="hbtn" onclick="openLogin()" title="Connexion">🔑</button>
    <button class="hbtn grey" id="addBtn" onclick="openAddModal()" title="Ajouter" style="display:none">+</button>
    <button class="hbtn grey" onclick="doLogout()" title="Déconnexion" id="logoutBtn" style="display:none">🚪</button>
  </div>
</div>

<!-- LÉGENDE -->
<div class="legend-bar">
  <span style="color:var(--gold);font-size:9px;font-weight:700;letter-spacing:1px;flex-shrink:0">LÉGENDE</span>
  <div class="legend-item"><div class="legend-dot" style="background:#2980B9"></div>Les Clés de Colette</div>
  <div class="legend-item"><div class="legend-dot" style="background:#27AE60"></div>Agence Aloha</div>
  <div class="legend-item"><div class="legend-dot" style="background:#9B59B6"></div>Travel Paradise</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F39C12"></div>Autre</div>
  <div class="legend-item"><div style="width:10px;height:10px;border-radius:2px;background:var(--urgent);flex-shrink:0"></div>Urgent</div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <span class="week-label" id="weekLabel">Semaine</span>
    <button onclick="changeWeek(1)">›</button>
  </div>
  <div id="filterChips" style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;"></div>
  <button class="add-mission-btn" id="addBtn2" onclick="openAddModal()" style="display:none">+ Mission</button>
</div>

<!-- CALENDRIER -->
<div class="calendar-wrap">
  <div class="calendar" id="calendar"></div>
</div>

<!-- ── LOGIN OVERLAY ── -->
<div class="overlay hidden" id="loginOverlay">
  <div class="login-sheet">
    <div class="ls-title">
      Connexion
      <button class="ls-close" onclick="closeLogin()">✕</button>
    </div>
    <div id="loginStep1">
      <button class="role-btn" onclick="showBossPin()">
        <span class="role-emoji">👑</span>
        <div><div style="font-weight:700">Mode Boss</div><div style="font-size:11px;color:#777">Saisie, modification, tout accès</div></div>
      </button>
      <button class="role-btn" onclick="showConsultantList()">
        <span class="role-emoji">🧹</span>
        <div><div style="font-weight:700">Mode Consultant</div><div style="font-size:11px;color:#777">Consultation + se positionner</div></div>
      </button>
    </div>
    <div id="loginBossPin" style="display:none">
      <div class="pin-wrap"><label>CODE BOSS</label><input type="password" id="bossInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')checkBoss()"/></div>
      <button class="pin-submit" onclick="checkBoss()">Entrer →</button>
      <div class="pin-error" id="bossErr">Code incorrect ❌</div>
    </div>
    <div id="loginConsultList" style="display:none">
      <div style="font-size:10px;font-weight:700;color:#aaa;letter-spacing:1px;margin-bottom:8px">JE SUIS :</div>
      <div class="consult-grid" id="consultGrid"></div>
    </div>
    <div id="loginConsultPin" style="display:none">
      <div id="consultPinLabel" style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;text-align:center"></div>
      <div class="pin-wrap"><label>MON CODE</label><input type="password" id="consultInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')checkConsultant()"/></div>
      <button class="pin-submit" onclick="checkConsultant()">Entrer →</button>
      <div class="pin-error" id="consultErr">Code incorrect ❌</div>
    </div>
  </div>
</div>

<!-- ── DÉTAIL MISSION ── -->
<div class="modal-overlay hidden" id="detailModal">
  <div class="modal-sheet" id="detailSheet"></div>
</div>

<!-- ── AJOUTER/MODIFIER MISSION ── -->
<div class="modal-overlay hidden" id="addModal">
  <div class="modal-sheet">
    <div class="modal-head">
      <div class="modal-head-top">
        <div class="modal-title" id="addModalTitle">Nouvelle mission</div>
        <button class="modal-close" onclick="closeAddModal()">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="f-group"><label class="f-label">NOM DU LOGEMENT</label><input class="f-input" id="f-nom" placeholder="ex: Le Portuaire"/></div>
      <div class="f-group"><label class="f-label">ADRESSE</label><input class="f-input" id="f-addr" placeholder="47 Av. du Lazaret, La Rochelle"/></div>
      <div class="f-2col">
        <div class="f-group"><label class="f-label">DATE</label><input class="f-input" id="f-date" type="date"/></div>
        <div class="f-group"><label class="f-label">HORAIRES</label><input class="f-input" id="f-horaires" placeholder="10h→16h"/></div>
      </div>
      <div class="f-2col">
        <div class="f-group"><label class="f-label">GRILLE</label>
          <select class="f-select" id="f-grille">
            <option>T2 — 1h solo</option><option>T3 — 1h30 solo</option>
            <option>T4 — 2h solo</option><option>T4 — 2h (1h chacun)</option><option>T5 — 2h30</option>
          </select>
        </div>
        <div class="f-group"><label class="f-label">CONCIERGERIE</label>
          <select class="f-select" id="f-client">
            <option>Les Clés de Colette</option><option>Agence Aloha</option>
            <option>Travel Paradise</option><option>Autre</option>
          </select>
        </div>
      </div>
      <div class="f-group"><label class="f-label">CODE ACCÈS</label><input class="f-input" id="f-code" placeholder="ex: 0418"/></div>
      <div class="f-group"><label class="f-label">INSTRUCTIONS ACCÈS</label><textarea class="f-textarea" id="f-acces" placeholder="Sonner LEMASLE 207 → Asc 2e → Apt 208..."></textarea></div>
      <div class="f-group"><label class="f-label">NOTES / SPÉCIFICITÉS</label><textarea class="f-textarea" id="f-notes" placeholder="Lit parapluie, baignoire bébé, arrivée même jour..."></textarea></div>
      <div class="f-group"><label class="f-label">🛏 LINGE</label>
        <div class="supply-grid">
          <div class="supply-item"><label>DH 160</label><input id="s-dh160" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>DH 90</label><input id="s-dh90" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>HC Double</label><input id="s-hcd" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>HC Simple</label><input id="s-hcs" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Serviettes</label><input id="s-serv" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Tapis bain</label><input id="s-tapis" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Torchons</label><input id="s-torch" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Canapé-lit</label><input id="s-canape" placeholder="ex: sur canapé"/></div>
        </div>
      </div>
      <div class="f-group"><label class="f-label">☕ CONSOMMABLES</label>
        <div class="supply-grid">
          <div class="supply-item"><label>Café</label><input id="s-cafe" placeholder="Nespresso × 2"/></div>
          <div class="supply-item"><label>Thé</label><input id="s-the" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Sucre</label><input id="s-sucre" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Papier WC</label><input id="s-pq" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Liquide vaisselle</label><input id="s-lv" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Sac noir</label><input id="s-noir" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Sac blanc</label><input id="s-blanc" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Éponge</label><input id="s-eponge" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Tab vaisselle</label><input id="s-tab" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Shampoing</label><input id="s-shamp" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Savon</label><input id="s-savon" type="number" min="0" placeholder="0"/></div>
          <div class="supply-item"><label>Poubelle</label><input id="s-poubelle" placeholder="Point apport vol."/></div>
        </div>
      </div>
      <div class="f-group"><label class="f-label">URGENT ?</label>
        <div class="urgent-row" id="urgentRow" onclick="toggleUrgent()">
          <span id="urgIcon">⬜</span><span id="urgLabel" style="font-size:13px;font-weight:600">Pas urgent</span>
        </div>
      </div>
      <button class="f-submit" onclick="submitMission()">✅ Enregistrer</button>

// ── SEMAINE ──
function getWeekDates(offset){
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day===0?6:day-1) + offset*7);
  return Array.from({length:7},(_,i)=>{
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    return d;
  });
}
function fmtIso(d){return d.toISOString().split('T')[0];}
function fmtShort(d){
  const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  return {day:days[d.getDay()],date:`${d.getDate()} ${months[d.getMonth()]}`};
}
function changeWeek(dir){weekOffset+=dir;renderAll();}

// ── COLOR ──
function clientColor(c){
  if(c.includes('Colette'))return 'bg-colette';
  if(c.includes('Aloha'))return 'bg-aloha';
  if(c.includes('Paradise'))return 'bg-paradise';
  return 'bg-autre';
}

// ── RENDER ──
function renderAll(){
  renderWeekLabel();
  renderFilters();
  renderCalendar();
}

function renderWeekLabel(){
  const dates = getWeekDates(weekOffset);
  const s = fmtShort(dates[0]), e = fmtShort(dates[6]);
  document.getElementById('weekLabel').textContent = `${s.date} – ${e.date}`;
}

function renderFilters(){
  const wrap = document.getElementById('filterChips');
  const chips = [{id:'all',label:'Tout voir',emoji:''}];
  if(mode==='boss'||mode==='consultant'){
    CONSULTANTS.forEach(c=>chips.push({id:c.id,label:c.name,emoji:c.emoji}));
  }
  wrap.innerHTML = chips.map(c=>`
    <button class="filter-chip ${activeFilter==c.id?'active':''}" onclick="setFilter('${c.id}')">
      ${c.emoji} ${c.label}
    </button>`).join('');
}

function setFilter(id){
  activeFilter = id=='all'?'all':parseInt(id)||id;
  renderFilters();
  renderCalendar();
}

function renderCalendar(){
  const dates = getWeekDates(weekOffset);
  const todayIso = fmtIso(new Date());
  const cal = document.getElementById('calendar');
  cal.innerHTML = dates.map(d=>{
    const iso = fmtIso(d);
    const {day,date} = fmtShort(d);
    const isToday = iso===todayIso;
    let dayMissions = missions.filter(m=>m.date===iso);

    // filtre
    if(activeFilter!=='all'){
      dayMissions = dayMissions.filter(m=>m.agents&&m.agents.includes(activeFilter));
    }

    const cards = dayMissions.map(m=>renderCard(m)).join('');
    return `
    <div class="day-col">
      <div class="day-header ${isToday?'today':''}">
        <div class="day-name">${day}</div>
        <div class="day-date">${date}</div>
      </div>
      <div class="day-content">
        ${cards||`<div class="empty">—</div>`}
      </div>
    </div>`;
  }).join('');
}

function renderCard(m){
  const agents = m.agents&&m.agents.length>0
    ? m.agents.map(id=>{const c=CONSULTANTS.find(x=>x.id===id);return c?c.emoji:'?';}).join('')
    : '';
  const grille = m.grille?m.grille.split('—')[0].trim():'';
  return `
  <div class="m-card ${clientColor(m.client)} ${m.urgent?'urgent':''} ${m.done?'opacity50':''}"
       onclick="openDetail('${m.id}')">
    <div class="m-card-head">
      <div class="m-card-name">${m.nom}</div>
      <div class="m-card-time">⏰ ${m.horaires} · ${grille}</div>
      <div class="m-card-addr">📍 ${m.adresse?m.adresse.split(',')[0]:''}</div>

    <div class="m-card-bottom">
      <div class="m-card-agents">${agents}</div>

}

    c.shamp>0?`<div class="info-row"><span class="info-label">Shampoing</span><span class="info-val">${c.shamp}</span></div>`:'',

  const agentPills = CONSULTANTS.map(con=>{

    const canToggle = mode==='boss'||(mode==='consultant'&&myConsultant&&myConsultant.id===con.id);
    return `<div class="agent-pill ${sel?'selected':''} ${canToggle?'':'locked'}"
      onclick="${canToggle?`toggleAgent('${m.id}',${con.id})`:''}">

    </div>`:'';

  const editBtn = mode==='boss'?`<button onclick="openEditModal('${m.id}')" style="width:100%;padding:10px;background:var(--navy);color:var(--gold);border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:6px;">✏️ Modifier cette mission</button>`:'';

  document.getElementById('detailSheet').innerHTML = `
    <div class="modal-head">
      <div class="modal-head-top">
        <div>
          <div class="modal-title">${m.urgent?'⚠️ ':''}${m.nom}</div>

function closeDetail(){document.getElementById('detailModal').classList.add('hidden');}

function toggleAgent(id,consultId){
  const m = missions.find(x=>x.id===id);
  if(!m)return;
  if(!m.agents)m.agents=[];
  const i=m.agents.indexOf(consultId);
  if(i>=0)m.agents.splice(i,1);else m.agents.push(consultId);
  save();openDetail(id);renderCalendar();
}

function toggleDone(id){
  const m=missions.find(x=>x.id===id);
  if(!m)return;
  m.done=!m.done;save();openDetail(id);renderCalendar();
}

function addPhoto(id,input){
  const m=missions.find(x=>x.id===id);
  if(!m||!input.files[0])return;
  const r=new FileReader();
  r.onload=e=>{
    if(!m.photos)m.photos=[];
    m.photos.push(e.target.result);
    save();openDetail(id);
  };
  r.readAsDataURL(input.files[0]);
}

  document.getElementById('s-lv').value=c.lv||0;

function clearForm(){
  ['f-nom','f-addr','f-horaires','f-code','f-acces','f-notes','s-canape','s-cafe','s-poubelle'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['s-dh160','s-dh90','s-hcd','s-hcs','s-serv','s-tapis','s-torch','s-the','s-sucre','s-pq','s-lv','s-noir','s-blanc','s-eponge','s-tab','s-shamp','s-savon'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=0;});
  urgentOn=false;
  document.getElementById('urgIcon').textContent='⬜';
  document.getElementById('urgLabel').textContent='Pas urgent';
  document.getElementById('urgentRow').classList.remove('on');
}

function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function gn(id){const v=parseInt(gv(id));return isNaN(v)?0:v;}

function submitMission(){
  const nom=gv('f-nom').trim();if(!nom){alert('Nom obligatoire');return;}
  const data={
    nom,adresse:gv('f-addr'),date:gv('f-date')||fmtIso(new Date()),
    horaires:gv('f-horaires')||'10h→16h',grille:gv('f-grille'),client:gv('f-client'),
    code:gv('f-code'),acces:gv('f-acces'),notes:gv('f-notes'),urgent:urgentOn,
    linge:{dh160:gn('s-dh160'),dh90:gn('s-dh90'),hcd:gn('s-hcd'),hcs:gn('s-hcs'),serv:gn('s-serv'),tapis:gn('s-tapis'),torch:gn('s-torch'),canape:gv('s-canape')},
    conso:{cafe:gv('s-cafe'),the:gn('s-the'),sucre:gn('s-sucre'),pq:gn('s-pq'),lv:gn('s-lv'),noir:gn('s-noir'),blanc:gn('s-blanc'),eponge:gn('s-eponge'),tab:gn('s-tab'),shamp:gn('s-shamp'),savon:gn('s-savon'),poubelle:gv('s-poubelle')}
  };
  if(editingId){
    const idx=missions.findIndex(m=>m.id===editingId);
    if(idx>=0){missions[idx]={...missions[idx],...data};}
  } else {
    missions.push({id:uid(),done:false,agents:[],photos:[],...data});
  }
  save();closeAddModal();renderCalendar();
}

function deleteMission(){
  if(!editingId)return;
  if(!confirm('Supprimer cette mission ?'))return;
  missions=missions.filter(m=>m.id!==editingId);
  save();closeAddModal();renderCalendar();
}

function toggleUrgent(){
  urgentOn=!urgentOn;
  document.getElementById('urgIcon').textContent=urgentOn?'🔴':'⬜';
  document.getElementById('urgLabel').textContent=urgentOn?'URGENT':'Pas urgent';
  document.getElementById('urgentRow').classList.toggle('on',urgentOn);
}

function setMode(m,consultant){
  mode=m;myConsultant=consultant;
  const badge=document.getElementById('modeBadge');
  const headerSub=document.getElementById('headerSub');
  const addBtn=document.getElementById('addBtn');
  const addBtn2=document.getElementById('addBtn2');
  const logoutBtn=document.getElementById('logoutBtn');
  if(m==='boss'){
    badge.textContent='👑 Boss';badge.className='mode-badge';
    headerSub.textContent='Mode Gestionnaire';
    addBtn.style.display='flex';addBtn2.style.display='block';
    logoutBtn.style.display='flex';
  } else if(m==='consultant'){
    badge.textContent=consultant.emoji+' '+consultant.name;badge.className='mode-badge consultant';
    headerSub.textContent='Mode Consultant';
    addBtn.style.display='none';addBtn2.style.display='none';
    logoutBtn.style.display='flex';
    activeFilter=consultant.id;
  } else {
    badge.textContent='👁 Visiteur';badge.className='mode-badge guest';
    headerSub.textContent='Planning Missions';
    addBtn.style.display='none';addBtn2.style.display='none';
    logoutBtn.style.display='none';
  }
  renderAll();
}

function doLogout(){mode='guest';myConsultant=null;activeFilter='all';setMode('guest',null);}

// ── INIT ──
renderAll();
</script>
