<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILECLAT — Planning</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MILECLAT">
<meta name="theme-color" content="#0D1B2A">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#0D1B2A; --navy2:#1B4F72; --gold:#C9A84C;
  --gold-light:#E8D5A3; --urgent:#C0392B; --urgent-light:#FADBD8;
  --done:#1E8449; --white:#fff; --grey:#F4F6F7; --border:#D5D8DC;
}
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--navy); min-height:100vh; }

/* LOGIN SCREEN */
.login-screen {
  position:fixed; inset:0; background:var(--navy);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:999; padding:30px;
}
.login-screen.hidden { display:none; }
.login-logo { font-size:48px; margin-bottom:10px; }
.login-title { color:var(--gold); font-size:22px; font-weight:700; letter-spacing:2px; margin-bottom:4px; }
.login-sub { color:var(--gold-light); font-size:12px; margin-bottom:40px; }
.login-card { background:#111E2E; border-radius:16px; padding:24px; width:100%; max-width:340px; border:1px solid #1E3A5F; }
.login-card h2 { color:var(--gold); font-size:14px; font-weight:700; letter-spacing:1px; margin-bottom:16px; text-align:center; }
.role-btn {
  width:100%; padding:14px; border-radius:12px; border:2px solid #1E3A5F;
  background:#0D1B2A; color:var(--gold-light); font-size:14px; font-weight:600;
  cursor:pointer; margin-bottom:10px; display:flex; align-items:center; gap:12px;
  transition:all 0.2s;
}
.role-btn:hover { border-color:var(--gold); color:var(--gold); }
.role-btn .role-emoji { font-size:24px; }
.role-btn .role-info { text-align:left; }
.role-btn .role-name { font-size:14px; font-weight:700; }
.role-btn .role-desc { font-size:11px; opacity:0.7; margin-top:2px; }
.pin-field { margin-top:16px; }
.pin-field label { display:block; color:#aaa; font-size:11px; font-weight:700; letter-spacing:1px; margin-bottom:6px; }
.pin-field input { width:100%; padding:12px; border-radius:8px; border:1.5px solid #1E3A5F; background:#0D1B2A; color:var(--gold); font-size:18px; letter-spacing:6px; text-align:center; font-weight:700; }
.pin-submit { width:100%; padding:13px; background:var(--gold); color:var(--navy); border:none; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; margin-top:10px; }
.pin-error { color:var(--urgent); font-size:12px; text-align:center; margin-top:8px; display:none; }

/* AIDE SELECTOR */
.aide-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.aide-select-btn {
  padding:16px 8px; border-radius:12px; border:2px solid #1E3A5F;
  background:#0D1B2A; color:var(--gold-light); font-size:13px; font-weight:600;
  cursor:pointer; text-align:center; transition:all 0.2s;
}
.aide-select-btn:hover { border-color:var(--gold); color:var(--gold); }
.aide-select-btn .ae { font-size:28px; display:block; margin-bottom:4px; }

/* HEADER */
.header {
  background:var(--navy); padding:12px 16px 10px;
  border-bottom:2px solid var(--gold);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.logo-text { color:var(--gold); font-size:15px; font-weight:700; letter-spacing:1px; }
.logo-sub { color:var(--gold-light); font-size:10px; }
.header-right { display:flex; gap:8px; align-items:center; }
.mode-badge {
  padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700;
  border:1.5px solid var(--gold); color:var(--gold); background:transparent;
}
.mode-badge.aide { border-color:#2ECC71; color:#2ECC71; }
.icon-btn { background:var(--gold); border:none; border-radius:50%; width:34px; height:34px; font-size:18px; cursor:pointer; display:flex;align-items:center;justify-content:center; }

.date-nav { background:#111E2E; padding:10px 14px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid #1E3A5F; }
.date-nav::-webkit-scrollbar { display:none; }
.date-btn { flex-shrink:0; padding:6px 14px; border-radius:20px; border:1px solid #1E3A5F; background:transparent; color:var(--gold-light); font-size:12px; cursor:pointer; white-space:nowrap; }
.date-btn.active { background:var(--gold); color:var(--navy); font-weight:700; border-color:var(--gold); }

.agents-bar { background:#0F1F30; padding:8px 14px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid #1E3A5F; align-items:center; }
.agents-bar::-webkit-scrollbar { display:none; }
.agents-title { color:var(--gold); font-size:10px; font-weight:700; letter-spacing:1px; flex-shrink:0; }
.agent-chip { flex-shrink:0; display:flex; align-items:center; gap:4px; background:#1B2E42; border:1px solid #2E4A6A; border-radius:20px; padding:4px 10px; font-size:11px; color:#BDC3C7; cursor:pointer; }
.agent-chip.selected { background:var(--navy2); border-color:var(--gold); color:var(--gold); }

.main { padding:14px; max-width:600px; margin:0 auto; }
.stats-bar { display:flex; gap:8px; margin-bottom:14px; }
.stat { flex:1; background:#111E2E; border-radius:10px; padding:8px; text-align:center; border:1px solid #1E3A5F; }
.stat-num { font-size:20px; font-weight:700; color:var(--gold); }
.stat-label { font-size:9px; color:#7F8C8D; letter-spacing:1px; text-transform:uppercase; }

.day-label { color:var(--gold); font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.day-label::after { content:''; flex:1; height:1px; background:linear-gradient(to right,var(--gold),transparent); }

.mission-card { background:var(--white); border-radius:12px; margin-bottom:10px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.3); }
.card-top { display:flex; align-items:stretch; }
.card-stripe { width:5px; background:var(--navy2); flex-shrink:0; }
.card-stripe.urgent { background:var(--urgent); }
.card-stripe.done { background:var(--done); }
.card-body { flex:1; padding:11px 13px; }
.mission-name { font-size:14px; font-weight:700; color:var(--navy); }
.mission-name.urgent { color:var(--urgent); }
.mission-name.done { color:var(--done); text-decoration:line-through; }
.badge-urgent { background:var(--urgent); color:white; font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px; margin-left:6px; }
.badge-done { background:var(--done); color:white; font-size:9px; font-weight:700; padding:2px 7px; border-radius:10px; margin-left:6px; }
.mission-addr { font-size:11px; color:var(--navy2); margin-bottom:6px; margin-top:3px; }
.mission-meta { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.meta-pill { background:var(--grey); border-radius:8px; padding:3px 8px; font-size:10px; color:#555; font-weight:600; }
.meta-pill.gold { background:#FEF9EC; color:#8B6A1A; border:1px solid var(--gold-light); }

.details-btn { background:var(--navy); color:var(--gold); border:none; border-radius:8px; padding:6px 12px; font-size:11px; font-weight:700; cursor:pointer; margin-bottom:8px; width:100%; }
.details-panel { display:none; background:#F8F9FB; border-radius:8px; padding:10px; margin-bottom:8px; border:1px solid var(--border); }
.details-panel.open { display:block; }
.details-head { font-size:10px; font-weight:700; color:var(--navy2); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; padding-bottom:3px; border-bottom:1px solid var(--border); }
.details-row { display:flex; justify-content:space-between; padding:3px 0; font-size:11px; color:#333; border-bottom:1px solid #F0F0F0; }
.details-row:last-child { border-bottom:none; }
.details-row .qty { font-weight:700; color:var(--navy); }
.details-note { background:#FEF9EC; border-radius:6px; padding:6px 8px; font-size:11px; color:#7D5A0B; border-left:3px solid var(--gold); line-height:1.5; }
.code-badge { background:var(--navy); color:var(--gold); border-radius:6px; padding:5px 10px; font-size:13px; font-weight:700; letter-spacing:2px; display:inline-block; margin-top:4px; }
.details-section { margin-bottom:8px; }
.details-section:last-child { margin-bottom:0; }

/* MON POSITIONNEMENT (mode aide) */
.my-position { border-top:1px solid var(--border); padding-top:8px; margin-top:6px; }
.my-position-label { font-size:10px; font-weight:700; color:#999; letter-spacing:1px; margin-bottom:6px; }
.my-pos-btn {
  width:100%; padding:12px; border-radius:10px; border:2px solid var(--border);
  background:var(--grey); font-size:15px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px; color:#555;
  transition:all 0.2s;
}
.my-pos-btn.confirmed { background:var(--navy); border-color:var(--gold); color:var(--gold); }

/* AGENTS (mode boss) */
.agents-section { border-top:1px solid var(--border); padding-top:8px; margin-top:4px; }
.agents-label { font-size:9px; font-weight:700; color:#999; letter-spacing:1px; margin-bottom:5px; }
.agents-grid { display:flex; gap:5px; flex-wrap:wrap; }
.agent-toggle { display:flex; align-items:center; gap:3px; background:var(--grey); border:1.5px solid var(--border); border-radius:20px; padding:4px 9px; font-size:11px; cursor:pointer; color:#555; user-select:none; }
.agent-toggle.selected { background:var(--navy); border-color:var(--gold); color:var(--gold); font-weight:700; }

.done-toggle { display:flex; align-items:center; gap:8px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); cursor:pointer; user-select:none; }
.checkbox { width:20px; height:20px; border:2px solid var(--border); border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.checkbox.checked { background:var(--done); border-color:var(--done); }
.checkbox.checked::after { content:'✓'; color:white; font-size:12px; font-weight:700; }
.done-label { font-size:12px; color:#777; font-weight:600; }
.done-label.checked { color:var(--done); text-decoration:line-through; }

.add-btn { background:var(--gold); color:var(--navy); border:none; border-radius:12px; padding:14px; width:100%; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px; }
.empty-state { text-align:center; padding:40px 20px; color:var(--gold-light); opacity:0.6; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:flex-end; justify-content:center; }
.modal-overlay.hidden { display:none; }
.modal { background:white; border-radius:20px 20px 0 0; padding:18px; width:100%; max-width:600px; max-height:88vh; overflow-y:auto; }
.modal-title { font-size:15px; font-weight:700; color:var(--navy); margin-bottom:14px; display:flex; justify-content:space-between; }
.modal-close { background:var(--grey); border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:16px; }
.field { margin-bottom:11px; }
.field label { display:block; font-size:10px; font-weight:700; color:#777; letter-spacing:1px; margin-bottom:3px; }
.field input,.field select,.field textarea { width:100%; padding:9px 11px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-family:inherit; background:white; }
.field textarea { height:65px; resize:vertical; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.supply-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.supply-item { display:flex; flex-direction:column; }
.supply-item label { font-size:9px; color:#888; margin-bottom:2px; }
.supply-item input { padding:6px 8px; border:1px solid var(--border); border-radius:6px; font-size:12px; }
.urgent-toggle { display:flex; align-items:center; gap:10px; padding:9px 11px; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; user-select:none; }
.urgent-toggle.on { border-color:var(--urgent); background:var(--urgent-light); }
.submit-btn { background:var(--navy); color:var(--gold); border:none; border-radius:10px; padding:13px; width:100%; font-size:14px; font-weight:700; cursor:pointer; margin-top:6px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">🏠</div>
  <div class="login-title">MILECLAT</div>
  <div class="login-sub">Planning Missions</div>
  <div class="login-card">
    <h2>CHOISIR MON ACCÈS</h2>
    <button class="role-btn" onclick="showBossPin()">
      <span class="role-emoji">👑</span>
      <div class="role-info">
        <div class="role-name">Mode Gestionnaire</div>
        <div class="role-desc">Ajouter, modifier, assigner les missions</div>
      </div>
    </button>
    <div id="bossPin" style="display:none;">
      <div class="pin-field">
        <label>CODE D'ACCÈS</label>
        <input type="password" id="pinInput" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')checkPin()" />
      </div>
      <button class="pin-submit" onclick="checkPin()">Entrer →</button>
      <div class="pin-error" id="pinError">Code incorrect ❌</div>
    </div>
    <button class="role-btn" onclick="showAideSelector()" style="margin-top:4px;">
      <span class="role-emoji">🧹</span>
      <div class="role-info">
        <div class="role-name">Mode Aide</div>
        <div class="role-desc">Voir mes missions et me positionner</div>
      </div>
    </button>
    <div id="aideSelector" style="display:none;">
      <div style="color:#aaa;font-size:11px;font-weight:700;letter-spacing:1px;margin-top:12px;margin-bottom:8px;">JE SUIS :</div>
      <div class="aide-grid" id="aideGrid"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <div class="header">
    <div>
      <div class="logo-text">🏠 MILECLAT</div>
      <div class="logo-sub" id="headerSub">Planning</div>
    </div>
    <div class="header-right">
      <div class="mode-badge" id="modeBadge">👑 BOSS</div>
      <button class="icon-btn" onclick="logout()" title="Changer de mode">🚪</button>
      <button class="icon-btn" id="addBtn" onclick="openModal()" title="Ajouter mission">+</button>
    </div>
  </div>

  <div class="date-nav" id="dateNav"></div>
  <div class="agents-bar" id="agentsBarWrap">
    <div class="agents-title">FILTRER</div>
    <div id="agentsFilter" style="display:flex;gap:8px;"></div>
  </div>

  <div class="main">
    <div class="stats-bar" id="statsBar"></div>
    <div id="dayLabel" class="day-label"></div>
    <div id="missionsList"></div>
    <button class="add-btn" id="addBtn2" onclick="openModal()">+ Ajouter une mission</button>
  </div>
</div>

<!-- MODAL AJOUT -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Nouvelle mission <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="field"><label>NOM DU LOGEMENT</label><input id="f-nom" placeholder="ex: Le Portuaire"/></div>
    <div class="field"><label>ADRESSE</label><input id="f-addr" placeholder="47 Av. du Lazaret, La Rochelle"/></div>
    <div class="two-col">
      <div class="field"><label>DATE</label><input id="f-date" type="date"/></div>
      <div class="field"><label>HORAIRES</label><input id="f-horaires" placeholder="10h→16h"/></div>
    </div>
    <div class="two-col">
      <div class="field"><label>GRILLE</label>
        <select id="f-grille"><option>T2 — 1h solo</option><option>T3 — 1h30 solo</option><option>T4 — 2h solo</option><option>T4 — 2h (1h chacun)</option><option>T5 — 2h30 solo</option></select>
      </div>
      <div class="field"><label>CONCIERGERIE</label>
        <select id="f-client"><option>Les Clés de Colette</option><option>Agence Aloha</option><option>Travel Paradise</option><option>Autre</option></select>
      </div>
    </div>
    <div class="field"><label>CODE ACCÈS</label><input id="f-code" placeholder="ex: 0418"/></div>
    <div class="field"><label>INSTRUCTIONS ACCÈS</label><textarea id="f-acces" placeholder="Sonner LEMASLE 207 → Asc 2e..."></textarea></div>
    <div class="field"><label>NOTES / COMMENTAIRES</label><textarea id="f-notes" placeholder="Linge canapé, lit parapluie..."></textarea></div>
    <div class="field"><label>🛏 LINGE</label>
      <div class="supply-grid">
        <div class="supply-item"><label>DH 160</label><input id="s-dh160" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>DH 90</label><input id="s-dh90" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>HC Double</label><input id="s-hcd" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>HC Simple</label><input id="s-hcs" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Serviettes</label><input id="s-serv" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Tapis bain</label><input id="s-tapis" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Torchons</label><input id="s-torch" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Canapé-lit</label><input id="s-canape" placeholder="ex: sur canapé"/></div>
      </div>
    </div>
    <div class="field"><label>☕ CONSOMMABLES</label>
      <div class="supply-grid">
        <div class="supply-item"><label>Café</label><input id="s-cafe" placeholder="Nespresso × 2"/></div>
        <div class="supply-item"><label>Thé</label><input id="s-the" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Sucre</label><input id="s-sucre" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Papier toilette</label><input id="s-pq" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Liquide vaisselle</label><input id="s-lv" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Sac noir</label><input id="s-noir" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Sac blanc</label><input id="s-blanc" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Éponge</label><input id="s-eponge" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Tab vaisselle</label><input id="s-tab" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Shampoing</label><input id="s-shamp" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Savon</label><input id="s-savon" type="number" min="0" placeholder="0"/></div>
        <div class="supply-item"><label>Poubelle</label><input id="s-poubelle" placeholder="Point apport vol."/></div>
      </div>
    </div>
    <div class="field"><label>URGENT ?</label>
      <div class="urgent-toggle" id="urgentToggle" onclick="toggleUrgent()">
        <span id="urgentIcon">⬜</span><span id="urgentLabel" style="font-size:13px;font-weight:600;">Pas urgent</span>
      </div>
    </div>
    <button class="submit-btn" onclick="addMission()">✅ Ajouter</button>
  </div>
</div>

<script>
const BOSS_PIN = "3107"; // ← CHANGE TON CODE ICI
const AGENTS = [
  {name:"Aide 1",emoji:"1️⃣"},{name:"Aide 2",emoji:"2️⃣"},
  {name:"Aide 3",emoji:"3️⃣"},{name:"Aide 4",emoji:"4️⃣"},
  {name:"Aide 5",emoji:"5️⃣"},{name:"Aide 6",emoji:"6️⃣"},{name:"Aide 7",emoji:"7️⃣"}
];

let mode = null; // 'boss' ou 'aide'
let myAide = null; // ex: {name:"Aide 1", emoji:"1️⃣"}
let missions = JSON.parse(localStorage.getItem('mileclat_v3')||'null') || getDefaults();
let currentDate = "2026-06-24";
let urgentOn = false;
let agentFilter = null;

// ─── LOGIN ───
function showBossPin() {
  document.getElementById('bossPin').style.display='block';
  document.getElementById('aideSelector').style.display='none';
}
function checkPin() {
  const v = document.getElementById('pinInput').value;
  if (v === BOSS_PIN) { enterBoss(); }
  else { document.getElementById('pinError').style.display='block'; }
}
function enterBoss() {
  mode='boss'; myAide=null;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').style.display='block';
  document.getElementById('modeBadge').textContent='👑 BOSS';
  document.getElementById('modeBadge').className='mode-badge';
  document.getElementById('headerSub').textContent='Mode Gestionnaire';
  document.getElementById('addBtn').style.display='flex';
  document.getElementById('addBtn2').style.display='block';
  document.getElementById('agentsBarWrap').style.display='flex';
  renderAll();
}
function showAideSelector() {
  document.getElementById('bossPin').style.display='none';
  const sel = document.getElementById('aideSelector');
  sel.style.display='block';
  document.getElementById('aideGrid').innerHTML = AGENTS.map(a =>
    `<button class="aide-select-btn" onclick="enterAide('${a.name}','${a.emoji}')">
      <span class="ae">${a.emoji}</span>${a.name}
    </button>`
  ).join('');
}
function enterAide(name, emoji) {
  mode='aide'; myAide={name,emoji};
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').style.display='block';
  document.getElementById('modeBadge').textContent=emoji+' '+name;
  document.getElementById('modeBadge').className='mode-badge aide';
  document.getElementById('headerSub').textContent='Mode Aide — Mes missions';
  document.getElementById('addBtn').style.display='none';
  document.getElementById('addBtn2').style.display='none';

// ─── RENDER ───
function getUniqueDates() {
  const dates=[..new Set(missions.map(m=>m.date))].sort();
  if(!dates.includes(currentDate)) dates.unshift(currentDate);
  return dates;
}
function fmtDate(d) {
  const days=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'],months=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
  const dt=new Date(d+'T12:00:00');
  return `${days[dt.getDay()]} ${dt.getDate()} ${months[dt.getMonth()]}`;
}
function renderAll() { renderDateNav(); renderAgentsFilter(); renderMissions(); }
function renderDateNav() {
  document.getElementById('dateNav').innerHTML=getUniqueDates().map(d=>
    `<button class="date-btn ${d===currentDate?'active':''}" onclick="selectDate('${d}')">${fmtDate(d)}</button>`
  ).join('');
}
function renderAgentsFilter() {
  document.getElementById('agentsFilter').innerHTML=AGENTS.map(a=>
    `<div class="agent-chip ${agentFilter===a.name?'selected':''}" onclick="filterAgent('${a.name}')">${a.emoji} ${a.name}</div>`
  ).join('');
}
function filterAgent(n){agentFilter=agentFilter===n?null:n;renderAgentsFilter();renderMissions();}
function selectDate(d){currentDate=d;renderDateNav();renderMissions();}

function renderMissions() {
  let list=missions.filter(m=>m.date===currentDate);
  if(mode==='boss' && agentFilter) list=list.filter(m=>m.agents&&m.agents.includes(agentFilter));
  list.sort((a,b)=>(b.urgent?1:0)-(a.urgent?1:0));
  const total=list.length,done=list.filter(m=>m.done).length,urg=list.filter(m=>m.urgent).length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Missions</div></div>
    <div class="stat"><div class="stat-num" style="color:#C0392B">${urg}</div><div class="stat-label">Urgentes</div></div>
    <div class="stat"><div class="stat-num" style="color:#1E8449">${done}/${total}</div><div class="stat-label">Faites</div></div>`;
  document.getElementById('dayLabel').textContent=fmtDate(currentDate).toUpperCase();
  if(!list.length){document.getElementById('missionsList').innerHTML=`<div class="empty-state"><div style="font-size:40px">📋</div><p>Aucune mission ce jour.</p></div>`;return;}

  document.getElementById('missionsList').innerHTML=list.map(m=>{
    const idx=missions.indexOf(m);
    const sc=m.done?'done':m.urgent?'urgent':'';
    const nc=m.done?'done':m.urgent?'urgent':'';
    const badge=m.done?'<span class="badge-done">✓ FAIT</span>':m.urgent?'<span class="badge-urgent">⚠ URGENT</span>':'';
    const l=m.linge||{}, c=m.conso||{};
    const lingeRows=[
      l.dh160>0?`<div class="details-row"><span>🛏 DH 160cm</span><span class="qty">${l.dh160}</span></div>`:'',
      l.dh90>0?`<div class="details-row"><span>🛏 DH 90cm</span><span class="qty">${l.dh90}</span></div>`:'',
      l.hcd>0?`<div class="details-row"><span>🛌 HC Double</span><span class="qty">${l.hcd}</span></div>`:'',
      l.hcs>0?`<div class="details-row"><span>🛌 HC Simple</span><span class="qty">${l.hcs}</span></div>`:'',
      l.serv>0?`<div class="details-row"><span>🚿 Serviettes</span><span class="qty">${l.serv}</span></div>`:'',
      l.tapis>0?`<div class="details-row"><span>🚿 Tapis bain</span><span class="qty">${l.tapis}</span></div>`:'',
      l.torch>0?`<div class="details-row"><span>🧹 Torchons</span><span class="qty">${l.torch}</span></div>`:'',
      l.canape?`<div class="details-row"><span>🛋 Canapé-lit</span><span class="qty">${l.canape}</span></div>`:'',
    ].filter(Boolean).join('');
    const consoRows=[
      c.cafe?`<div class="details-row"><span>☕ Café</span><span class="qty">${c.cafe}</span></div>`:'',
      c.the>0?`<div class="details-row"><span>🍵 Thé</span><span class="qty">${c.the}</span></div>`:'',
      c.sucre>0?`<div class="details-row"><span>🍬 Sucre</span><span class="qty">${c.sucre}</span></div>`:'',
      c.pq>0?`<div class="details-row"><span>🧻 Papier WC</span><span class="qty">${c.pq}</span></div>`:'',
      c.lv>0?`<div class="details-row"><span>🧴 LV</span><span class="qty">${c.lv}</span></div>`:'',
      c.noir>0?`<div class="details-row"><span>🗑 Sac noir</span><span class="qty">${c.noir}</span></div>`:'',
      c.blanc>0?`<div class="details-row"><span>🗑 Sac blanc</span><span class="qty">${c.blanc}</span></div>`:'',
      c.eponge>0?`<div class="details-row"><span>🧽 Éponge</span><span class="qty">${c.eponge}</span></div>`:'',
      c.tab>0?`<div class="details-row"><span>🍽 Tab</span><span class="qty">${c.tab}</span></div>`:'',
      c.shamp>0?`<div class="details-row"><span>🧴 Shamp</span><span class="qty">${c.shamp}</span></div>`:'',
      c.savon>0?`<div class="details-row"><span>🧼 Savon</span><span class="qty">${c.savon}</span></div>`:'',
      c.poubelle?`<div class="details-row"><span>🗑 Poubelle</span><span class="qty">${c.poubelle}</span></div>`:'',
    ].filter(Boolean).join('');

    // Mode AIDE : juste son bouton
    const aideSection = mode==='aide' ? `
      <div class="my-position">
        <div class="my-position-label">MA DISPONIBILITÉ</div>
        <button class="my-pos-btn ${m.agents&&m.agents.includes(myAide.name)?'confirmed':''}"
          onclick="toggleAgent(${idx},'${myAide.name}')">
          ${m.agents&&m.agents.includes(myAide.name)
            ? `${myAide.emoji} Je suis sur cette mission ✓`
            : `${myAide.emoji} Me positionner sur cette mission`}
        </button>
      </div>` : '';

    // Mode BOSS : tous les agents + cocher terminé
    const bossSection = mode==='boss' ? `
      <div class="agents-section">
        <div class="agents-label">ÉQUIPE ASSIGNÉE</div>
        <div class="agents-grid">${AGENTS.map(a=>`
          <div class="agent-toggle ${m.agents&&m.agents.includes(a.name)?'selected':''}" onclick="toggleAgent(${idx},'${a.name}')">
            ${a.emoji} ${a.name}
          </div>`).join('')}
        </div>
      </div>
      <div class="done-toggle" onclick="toggleDone(${idx})">
        <div class="checkbox ${m.done?'checked':''}"></div>
        <span class="done-label ${m.done?'checked':''}">${m.done?'Mission terminée ✓':'Marquer comme terminée'}</span>
      </div>` : '';

    return `
    <div class="mission-card">
      <div class="card-top">
        <div class="card-stripe ${sc}"></div>
        <div class="card-body">
          <span class="mission-name ${nc}">${m.nom}${badge}</span>
          <div class="mission-addr">📍 ${m.adresse||'—'}</div>
          <div class="mission-meta">
            <span class="meta-pill">⏰ ${m.horaires}</span>
            <span class="meta-pill gold">⏱ ${m.grille}</span>
            <span class="meta-pill">${m.client}</span>
          </div>
          <button class="details-btn" onclick="toggleDetails(${idx})">📋 Voir détails & approvisionnement</button>
          <div class="details-panel" id="details-${idx}">
            ${m.code?`<div class="details-section"><div class="details-head">🔑 Accès</div><div class="code-badge">${m.code}</div>${m.acces?`<div style="font-size:11px;color:#555;margin-top:6px;line-height:1.6">${m.acces}</div>`:''}</div>`:''}
            ${m.notes?`<div class="details-section"><div class="details-note">📌 ${m.notes}</div></div>`:''}
            ${lingeRows?`<div class="details-section"><div class="details-head">🛏 Linge</div>${lingeRows}</div>`:''}
            ${consoRows?`<div class="details-section"><div class="details-head">☕ Consommables</div>${consoRows}</div>`:''}
          </div>
          ${aideSection}${bossSection}
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleDetails(idx){
  const el=document.getElementById('details-'+idx);
  el.classList.toggle('open');
  el.previousElementSibling.textContent=el.classList.contains('open')?'🔼 Masquer':'📋 Voir détails & approvisionnement';
}
function toggleAgent(idx,name){
  if(!missions[idx].agents)missions[idx].agents=[];
  const i=missions[idx].agents.indexOf(name);
  if(i>=0)missions[idx].agents.splice(i,1);else missions[idx].agents.push(name);
  save();renderMissions();
}
function toggleDone(idx){missions[idx].done=!missions[idx].done;save();renderMissions();}

function openModal(){
  document.getElementById('f-date').value=currentDate;
  urgentOn=false;
  document.getElementById('urgentIcon').textContent='⬜';
  document.getElementById('urgentLabel').textContent='Pas urgent';
  document.getElementById('urgentToggle').classList.remove('on');
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
  ['f-nom','f-addr','f-horaires','f-notes','f-code','f-acces','s-dh160','s-dh90','s-hcd','s-hcs','s-serv','s-tapis','s-torch','s-canape','s-cafe','s-the','s-sucre','s-pq','s-lv','s-noir','s-blanc','s-eponge','s-tab','s-shamp','s-savon','s-poubelle'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}
function toggleUrgent(){
  urgentOn=!urgentOn;
  document.getElementById('urgentIcon').textContent=urgentOn?'🔴':'⬜';
  document.getElementById('urgentLabel').textContent=urgentOn?'URGENT':'Pas urgent';
  document.getElementById('urgentToggle').classList.toggle('on',urgentOn);
}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function gn(id){const v=parseInt(gv(id));return isNaN(v)?0:v;}
function addMission(){
  const nom=gv('f-nom').trim();if(!nom){alert('Nom obligatoire');return;}
  missions.push({nom,adresse:gv('f-addr'),date:gv('f-date')||currentDate,horaires:gv('f-horaires')||'10h→16h',grille:gv('f-grille'),client:gv('f-client'),code:gv('f-code'),acces:gv('f-acces'),notes:gv('f-notes'),urgent:urgentOn,done:false,agents:[],linge:{dh160:gn('s-dh160'),dh90:gn('s-dh90'),hcd:gn('s-hcd'),hcs:gn('s-hcs'),serv:gn('s-serv'),tapis:gn('s-tapis'),torch:gn('s-torch'),canape:gv('s-canape')},conso:{cafe:gv('s-cafe'),the:gn('s-the'),sucre:gn('s-sucre'),pq:gn('s-pq'),lv:gn('s-lv'),noir:gn('s-noir'),blanc:gn('s-blanc'),eponge:gn('s-eponge'),tab:gn('s-tab'),shamp:gn('s-shamp'),savon:gn('s-savon'),poubelle:gv('s-poubelle')}});
  save();currentDate=missions[missions.length-1].date;closeModal();renderDateNav();renderMissions();
}
</script>
